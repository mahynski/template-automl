---
name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pyproject-toml:
    name: Validate pyproject.toml files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install validate-pyproject
        run: pip install validate-pyproject

      - name: Validate all project pyproject.toml files
        run: |
          failed=0
          for f in projects/*/pyproject.toml; do
            echo "Validating $f ..."
            if ! validate-pyproject "$f"; then
              echo "FAILED: $f"
              failed=1
            fi
          done
          exit $failed

  dotenv-config:
    name: Validate dotenv_config.py syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check Python syntax
        run: python -m py_compile dotenv_config.py
